<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JKRT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Noto Sans JP", ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <!-- Fallback only when the server has no DB. Prefer live GET / dashboard. -->
  <main class="mx-auto max-w-lg px-4 py-12">
    <h1 class="text-2xl font-bold text-blue-500">Japanese Kanji Reading Trainer</h1>
    <p class="mt-3 text-slate-600">
      Review kanji-bearing words in real news sentences. Furigana stays hidden until you ask.
    </p>
    <div class="mt-6 flex flex-wrap gap-3">
      <a href="/review"
        class="rounded-lg bg-blue-500 px-4 py-2 text-sm font-medium text-white hover:bg-blue-600">
        Review
      </a>
      <a href="/articles"
        class="rounded-lg border border-slate-300 px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">
        Articles
      </a>
    </div>
  </main>
</body>
</html>
