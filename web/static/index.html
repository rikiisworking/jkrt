<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JKRT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Noto Sans JP", ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-lg px-4 py-12">
    <h1 class="text-2xl font-bold text-blue-500">Japanese Kanji Reading Trainer</h1>
    <p class="mt-3 text-slate-600">
      Phase 0 is running. Scrape, analyze, and Review arrive in later phases.
    </p>
    <p class="mt-2 text-sm text-slate-500">
      Health: <a class="text-blue-500 underline" href="/health">/health</a>
    </p>
    <form method="post" action="/logout" class="mt-8">
      <button type="submit"
        class="rounded-lg bg-blue-500 px-4 py-2 text-sm font-medium text-white hover:bg-blue-600">
        Log out
      </button>
    </form>
  </main>
</body>
</html>
